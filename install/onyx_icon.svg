<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  
  <!-- Robot head -->
  <rect x="176" y="176" width="160" height="160" rx="24" 
        fill="#16213e" stroke="#4a9eff" stroke-width="5"/>
  
  <!-- Head detail lines -->
  <line x1="186" y1="196" x2="326" y2="196" stroke="#2a4a6e" stroke-width="2"/>
  <line x1="186" y1="316" x2="326" y2="316" stroke="#2a4a6e" stroke-width="2"/>
  
  <!-- Antenna -->
  <line x1="256" y1="176" x2="256" y2="130" stroke="#4a9eff" stroke-width="4"/>
  <circle cx="256" cy="130" r="10" fill="#4a9eff">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="10;14;10" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Left antenna side -->
  <line x1="210" y1="176" x2="210" y2="150" stroke="#4a9eff" stroke-width="3"/>
  <circle cx="210" cy="150" r="6" fill="#4a9eff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Right antenna side -->
  <line x1="302" y1="176" x2="302" y2="150" stroke="#4a9eff" stroke-width="3"/>
  <circle cx="302" cy="150" r="6" fill="#4a9eff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Eyes -->
  <circle cx="220" cy="235" r="18" fill="#0f3460" stroke="#4a9eff" stroke-width="3"/>
  <circle cx="220" cy="235" r="10" fill="#4a9eff">
    <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="292" cy="235" r="18" fill="#0f3460" stroke="#4a9eff" stroke-width="3"/>
  <circle cx="292" cy="235" r="10" fill="#4a9eff">
    <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Eye pupils -->
  <circle cx="222" cy="233" r="4" fill="#ffffff">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="294" cy="233" r="4" fill="#ffffff">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Nose/sensor -->
  <rect x="248" y="255" width="16" height="8" rx="4" fill="#4a9eff" opacity="0.6"/>
  
  <!-- Mouth/speaker grill -->
  <rect x="206" y="285" width="100" height="35" rx="18" 
        fill="#0f3460" stroke="#4a9eff" stroke-width="3"/>
  
  <!-- Speaker lines -->
  <line x1="220" y1="292" x2="220" y2="313" stroke="#4a9eff" stroke-width="2.5" opacity="0.8"/>
  <line x1="235" y1="292" x2="235" y2="313" stroke="#4a9eff" stroke-width="2.5" opacity="0.8"/>
  <line x1="250" y1="292" x2="250" y2="313" stroke="#4a9eff" stroke-width="2.5" opacity="0.8"/>
  <line x1="265" y1="292" x2="265" y2="313" stroke="#4a9eff" stroke-width="2.5" opacity="0.8"/>
  <line x1="280" y1="292" x2="280" y2="313" stroke="#4a9eff" stroke-width="2.5" opacity="0.8"/>
  <line x1="292" y1="292" x2="292" y2="313" stroke="#4a9eff" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Neck connector -->
  <rect x="236" y="336" width="40" height="20" fill="#16213e" stroke="#4a9eff" stroke-width="3"/>
  <rect x="242" y="342" width="28" height="8" fill="#0f3460"/>
  
  <!-- Side panels -->
  <rect x="176" y="220" width="12" height="40" rx="6" fill="#0f3460" stroke="#4a9eff" stroke-width="2"/>
  <rect x="324" y="220" width="12" height="40" rx="6" fill="#0f3460" stroke="#4a9eff" stroke-width="2"/>
  
  <!-- Text -->
  <text x="256" y="415" font-family="Arial, Helvetica, sans-serif" font-size="52" 
        font-weight="bold" fill="#4a9eff" text-anchor="middle" letter-spacing="4">ONYX</text>
  
  <!-- Subtitle -->
  <text x="256" y="445" font-family="Arial, Helvetica, sans-serif" font-size="18" 
        font-weight="normal" fill="#6ab9ff" text-anchor="middle" opacity="0.8">AI ASSISTANT</text>
</svg>
