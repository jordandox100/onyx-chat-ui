<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080b10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2233"/>
      <stop offset="100%" stop-color="#0c1017"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080b10"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="220" r="200" fill="url(#glow)"/>

  <!-- Neck -->
  <rect x="230" y="310" width="52" height="40" rx="4" fill="#121822"/>
  <rect x="238" y="320" width="36" height="8" rx="2" fill="#1a2233"/>

  <!-- Shoulders -->
  <path d="M 180 350 Q 180 335 210 330 L 302 330 Q 332 335 332 350 L 332 380 Q 332 395 310 395 L 202 395 Q 180 395 180 380 Z" fill="url(#bodyGrad)" stroke="#1c2638" stroke-width="1.5"/>
  <line x1="200" y1="345" x2="200" y2="385" stroke="#1c2638" stroke-width="1"/>
  <line x1="312" y1="345" x2="312" y2="385" stroke="#1c2638" stroke-width="1"/>

  <!-- Head — sleek rounded shape -->
  <path d="M 176 200 Q 176 120 256 110 Q 336 120 336 200 L 336 270 Q 336 310 300 315 L 212 315 Q 176 310 176 270 Z"
        fill="url(#bodyGrad)" stroke="#1c2638" stroke-width="2"/>

  <!-- Forehead panel line -->
  <path d="M 200 155 Q 256 140 312 155" fill="none" stroke="#1c2638" stroke-width="1.5"/>

  <!-- Cheek panels -->
  <line x1="185" y1="220" x2="185" y2="270" stroke="#1c2638" stroke-width="1" opacity="0.6"/>
  <line x1="327" y1="220" x2="327" y2="270" stroke="#1c2638" stroke-width="1" opacity="0.6"/>

  <!-- Eye sockets -->
  <ellipse cx="218" cy="215" rx="28" ry="18" fill="#080b10"/>
  <ellipse cx="294" cy="215" rx="28" ry="18" fill="#080b10"/>

  <!-- Eyes — glowing cyan -->
  <ellipse cx="218" cy="215" rx="18" ry="11" fill="#00d4ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="294" cy="215" rx="18" ry="11" fill="#00d4ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eye highlights -->
  <ellipse cx="224" cy="211" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="300" cy="211" rx="5" ry="3" fill="#ffffff" opacity="0.6"/>

  <!-- Nose bridge -->
  <line x1="256" y1="195" x2="256" y2="248" stroke="#1c2638" stroke-width="1.5"/>

  <!-- Mouth — subtle line -->
  <path d="M 225 278 Q 240 286 256 286 Q 272 286 287 278" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>

  <!-- Ear panels -->
  <rect x="164" y="195" width="12" height="50" rx="6" fill="#121822" stroke="#1c2638" stroke-width="1"/>
  <rect x="336" y="195" width="12" height="50" rx="6" fill="#121822" stroke="#1c2638" stroke-width="1"/>
  <circle cx="170" cy="220" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="342" cy="220" r="3" fill="#00d4ff" opacity="0.6"/>

  <!-- Top accent line -->
  <path d="M 220 115 Q 256 105 292 115" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>

  <!-- Brand text -->
  <text x="256" y="460" font-family="monospace" font-size="42" font-weight="900"
        fill="#00d4ff" text-anchor="middle" letter-spacing="8">ONYX</text>
</svg>
